stages:
  - lint
  - test
  - build

lint:
  stage: lint
  image: golang:1.25.4-alpine
  before_script:
    - apk add --no-cache git curl
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v1.61.0
  script:
    - golangci-lint run -v
  allow_failure: false

test:
  stage: test
  image: golang:1.25.4-alpine
  before_script:
    - apk add --no-cache git make gcc musl-dev
    - go mod download
  script:
    - go test -v -race ./...

build:docker:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf "%s:%s" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --target subscriptionService
      --destination "${CI_REGISTRY_IMAGE}/app:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/app:latest"

    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --target migrate
      --destination "${CI_REGISTRY_IMAGE}/migrate:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/migrate:latest"
