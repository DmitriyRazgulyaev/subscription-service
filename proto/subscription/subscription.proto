syntax = "proto3";

option go_package = "pkg/proto";

service SubscriptionService {
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
  rpc GetSubscription(GetSubscriptionRequest) returns (GetSubscriptionResponse);
  rpc UpdateSubscription(UpdateSubscriptionRequest) returns (UpdateSubscriptionResponse);
  rpc DeleteSubscription(DeleteSubscriptionRequest) returns (DeleteSubscriptionResponse);
  rpc GetAnalytics(GetAnalyticsRequest) returns (GetAnalyticsResponse);
  rpc GetExpiringSubscriptions(GetExpiringSubscriptionsRequest) returns (GetExpiringSubscriptionsResponse);
}

message Subscription {
  string id = 1;
  string name = 2;
  string startedAt = 3;
  string expiration = 4;
  int32 price = 5;
}

message MonthSpent {
  string month = 1;
  int32 totalMonthSpent = 2;
  repeated Subscription subs = 3;
}

message Year {
  string year = 1;
  int32 totalSpent = 2;
  repeated MonthSpent months = 3;
}

message Analytics {
  int32 totalSpent = 1;
  map<string, Year> years = 2;
  MonthSpent nextMonthSpends = 3;
}

message Period {
  string start = 1;
  string end = 2;
}

message CreateSubscriptionRequest {
  string id = 1;
  string name = 2;
  string startedAt = 3;
  string expiration = 4;
  int32 price = 5;
}

message CreateSubscriptionResponse {
  Subscription sub = 1;
}

message GetSubscriptionRequest {
  string id = 1;
  string name = 2;
}

message GetSubscriptionResponse {
  Subscription sub = 1;
}

message UpdateSubscriptionRequest {
  string id = 1;
  string oldName = 2;
  string name = 3;
  string startedAt = 4;
  string expiration = 5;
  int32 price = 6;
}

message UpdateSubscriptionResponse {
  Subscription sub = 1;
}

message DeleteSubscriptionRequest {
  string id = 1;
  string name = 2;
}

message DeleteSubscriptionResponse {
  bool success = 1;
}

message GetAnalyticsRequest {
  string id = 1;
  Period period = 2;
}

message GetAnalyticsResponse {
  Analytics analytics = 1;
}

// date format 2006-01-02
message GetExpiringSubscriptionsRequest {
  string date = 1;
}


message GetExpiringSubscriptionsResponse {
  repeated Subscription subs = 1;
}